<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="920" height="620" fill="#f8fafc"/>

  <!-- header -->
  <text x="40" y="46" font-size="26" font-weight="700" fill="#0f172a">Draw<tspan fill="#7c3aed">Spin</tspan></text>
  <text x="40" y="66" font-size="13" fill="#64748b">Server-authoritative real-time draw game</text>

  <circle cx="600" cy="40" r="5" fill="#10b981"/>
  <text x="614" y="45" font-size="13" fill="#64748b">3 online</text>

  <rect x="700" y="20" width="180" height="54" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="716" y="42" font-size="10" font-weight="600" letter-spacing="1" fill="#94a3b8">BALANCE</text>
  <text x="716" y="63" font-size="18" font-weight="700" fill="#059669">1,000</text>

  <!-- wheel card -->
  <rect x="40" y="100" width="420" height="380" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="60" y="118" width="138" height="28" rx="14" fill="#d1fae5"/>
  <text x="129" y="137" font-size="13" font-weight="600" fill="#047857" text-anchor="middle">Place your bets</text>
  <text x="440" y="140" font-size="22" font-weight="700" fill="#334155" text-anchor="end" font-family="monospace">8s</text>

  <!-- wheel slices -->
  <g stroke="#ffffff" stroke-width="2">
    <path d="M250,300 L370,300 A120,120 0 0 1 334.85,384.85 Z" fill="#ef4444"/>
    <path d="M250,300 L334.85,384.85 A120,120 0 0 1 250,420 Z" fill="#f59e0b"/>
    <path d="M250,300 L250,420 A120,120 0 0 1 165.15,384.85 Z" fill="#10b981"/>
    <path d="M250,300 L165.15,384.85 A120,120 0 0 1 130,300 Z" fill="#3b82f6"/>
    <path d="M250,300 L130,300 A120,120 0 0 1 165.15,215.15 Z" fill="#a855f7"/>
    <path d="M250,300 L165.15,215.15 A120,120 0 0 1 250,180 Z" fill="#ec4899"/>
    <path d="M250,300 L250,180 A120,120 0 0 1 334.85,215.15 Z" fill="#22d3ee"/>
    <path d="M250,300 L334.85,215.15 A120,120 0 0 1 370,300 Z" fill="#f97316"/>
  </g>
  <circle cx="250" cy="300" r="120" fill="none" stroke="#0f172a" stroke-width="5"/>

  <!-- slice labels -->
  <g font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">
    <text x="322.06" y="333.85">2x</text>
    <text x="279.85" y="376.06">3x</text>
    <text x="220.15" y="376.06">5x</text>
    <text x="177.94" y="333.85">2x</text>
    <text x="177.94" y="274.15">10x</text>
    <text x="220.15" y="231.94">2x</text>
    <text x="279.85" y="231.94">3x</text>
    <text x="322.06" y="274.15">5x</text>
  </g>

  <!-- hub + pointer -->
  <circle cx="250" cy="300" r="20" fill="#0f172a"/>
  <path d="M238,150 L262,150 L250,184 Z" fill="#7c3aed"/>

  <!-- bet panel -->
  <rect x="480" y="100" width="400" height="380" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="500" y="128" font-size="13" font-weight="600" fill="#334155">Pick a segment</text>

  <!-- segment buttons (2 cols) -->
  <g font-size="13" font-weight="500" fill="#0f172a">
    <!-- row 1 -->
    <rect x="500" y="138" width="178" height="34" rx="10" fill="#ef4444" fill-opacity="0.1" stroke="#e2e8f0"/>
    <circle cx="516" cy="155" r="6" fill="#ef4444"/><text x="530" y="159">2x</text>
    <rect x="690" y="138" width="178" height="34" rx="10" fill="#f59e0b" fill-opacity="0.1" stroke="#e2e8f0"/>
    <circle cx="706" cy="155" r="6" fill="#f59e0b"/><text x="720" y="159">3x</text>
    <!-- row 2 -->
    <rect x="500" y="180" width="178" height="34" rx="10" fill="#10b981" fill-opacity="0.1" stroke="#e2e8f0"/>
    <circle cx="516" cy="197" r="6" fill="#10b981"/><text x="530" y="201">5x</text>
    <rect x="690" y="180" width="178" height="34" rx="10" fill="#3b82f6" fill-opacity="0.1" stroke="#e2e8f0"/>
    <circle cx="706" cy="197" r="6" fill="#3b82f6"/><text x="720" y="201">2x</text>
    <!-- row 3 (10x selected) -->
    <rect x="500" y="222" width="178" height="34" rx="10" fill="#a855f7" fill-opacity="0.1" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="516" cy="239" r="6" fill="#a855f7"/><text x="530" y="243">10x</text>
    <rect x="690" y="222" width="178" height="34" rx="10" fill="#ec4899" fill-opacity="0.1" stroke="#e2e8f0"/>
    <circle cx="706" cy="239" r="6" fill="#ec4899"/><text x="720" y="243">2x</text>
    <!-- row 4 -->
    <rect x="500" y="264" width="178" height="34" rx="10" fill="#22d3ee" fill-opacity="0.1" stroke="#e2e8f0"/>
    <circle cx="516" cy="281" r="6" fill="#22d3ee"/><text x="530" y="285">3x</text>
    <rect x="690" y="264" width="178" height="34" rx="10" fill="#f97316" fill-opacity="0.1" stroke="#e2e8f0"/>
    <circle cx="706" cy="281" r="6" fill="#f97316"/><text x="720" y="285">5x</text>
  </g>

  <!-- stake -->
  <text x="500" y="324" font-size="13" font-weight="600" fill="#334155">Stake</text>
  <g font-size="13" font-weight="700" text-anchor="middle">
    <rect x="500" y="334" width="84" height="32" rx="10" fill="#f1f5f9"/><text x="542" y="355" fill="#475569">10</text>
    <rect x="594" y="334" width="84" height="32" rx="10" fill="#7c3aed"/><text x="636" y="355" fill="#ffffff">25</text>
    <rect x="688" y="334" width="84" height="32" rx="10" fill="#f1f5f9"/><text x="730" y="355" fill="#475569">50</text>
    <rect x="782" y="334" width="86" height="32" rx="10" fill="#f1f5f9"/><text x="825" y="355" fill="#475569">100</text>
  </g>

  <!-- bet button -->
  <rect x="500" y="384" width="368" height="44" rx="12" fill="#059669"/>
  <text x="684" y="411" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Bet 25 on 10x</text>

  <line x1="500" y1="448" x2="868" y2="448" stroke="#f1f5f9"/>
  <text x="500" y="468" font-size="13" fill="#64748b">Staked this round</text>
  <text x="868" y="468" font-size="13" font-weight="700" fill="#334155" text-anchor="end">75</text>

  <!-- recent draws -->
  <rect x="40" y="500" width="840" height="78" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="60" y="528" font-size="13" font-weight="600" fill="#334155">Recent draws</text>
  <g font-size="12" font-weight="700" text-anchor="middle">
    <rect x="60" y="540" width="40" height="30" rx="8" fill="#a855f7" fill-opacity="0.15"/><text x="80" y="560" fill="#a855f7">10x</text>
    <rect x="108" y="540" width="40" height="30" rx="8" fill="#10b981" fill-opacity="0.15"/><text x="128" y="560" fill="#10b981">5x</text>
    <rect x="156" y="540" width="40" height="30" rx="8" fill="#ef4444" fill-opacity="0.15"/><text x="176" y="560" fill="#ef4444">2x</text>
    <rect x="204" y="540" width="40" height="30" rx="8" fill="#f59e0b" fill-opacity="0.15"/><text x="224" y="560" fill="#f59e0b">3x</text>
    <rect x="252" y="540" width="40" height="30" rx="8" fill="#3b82f6" fill-opacity="0.15"/><text x="272" y="560" fill="#3b82f6">2x</text>
    <rect x="300" y="540" width="40" height="30" rx="8" fill="#f97316" fill-opacity="0.15"/><text x="320" y="560" fill="#f97316">5x</text>
    <rect x="348" y="540" width="40" height="30" rx="8" fill="#22d3ee" fill-opacity="0.15"/><text x="368" y="560" fill="#22d3ee">3x</text>
  </g>
</svg>
